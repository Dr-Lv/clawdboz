        async function confirmAddBots() {
            if (tempSelectedBots.size === 0) return;
            
            // 创建新会话
            const botIds = Array.from(tempSelectedBots);
            const newSession = createSession(botIds);
            
            // 添加到会话列表
            sessions.unshift(newSession);
            await saveSessionToDB(newSession);
            
            // 保存到服务器（确保刷新后仍然存在）
            await saveSessionToServer(newSession);
            
            // 切换到新会话
            await selectSession(newSession.id);
            renderSessionList();
            
            closeAddBotModal();
        }
        
        function closeAddBotModal() {
            document.getElementById('addBotModal').classList.remove('show');
            tempSelectedBots.clear();
            isCreatingNewSession = false;
        }
        
        function closeAddBotModalOnOverlay(event) {
            if (event.target.id === 'addBotModal') {
                closeAddBotModal();
            }
        }
        
        // ========== 会话右键菜单功能 ==========
        
        let contextMenuSessionId = null;
        
        function showSessionContextMenu(event, sessionId) {
            event.preventDefault();
            event.stopPropagation();
            
            contextMenuSessionId = sessionId;
            
            const menu = document.getElementById('sessionContextMenu');
            menu.style.left = event.clientX + 'px';
            menu.style.top = event.clientY + 'px';
            menu.classList.add('show');
            
            // 点击其他地方关闭菜单
            setTimeout(() => {
                document.addEventListener('click', closeContextMenu, { once: true });
            }, 0);
        }
        
        function closeContextMenu() {
            document.getElementById('sessionContextMenu').classList.remove('show');
            contextMenuSessionId = null;
        }
        
        function renameSession() {
            if (!contextMenuSessionId) return;
            
            const session = sessions.find(s => s.id === contextMenuSessionId);
            if (!session) return;
            
            document.getElementById('renameInput').value = session.name;
            document.getElementById('renameModal').classList.add('show');
            document.getElementById('renameInput').focus();
            document.getElementById('renameInput').select();
            
            closeContextMenu();
        }
        
        function closeRenameModal() {
            document.getElementById('renameModal').classList.remove('show');
            contextMenuSessionId = null;
        }
        
        function closeRenameModalOnOverlay(event) {
            if (event.target.id === 'renameModal') {
                closeRenameModal();
            }
        }
        
        async function confirmRename() {
            if (!contextMenuSessionId) return;
            
            const newName = document.getElementById('renameInput').value.trim();
            if (!newName) return;
            
            const session = sessions.find(s => s.id === contextMenuSessionId);
            if (session) {
                session.name = newName;
                await saveSessionToDB(session);
                renderSessionList();
                if (currentSessionId === contextMenuSessionId) {
                    updateHeader(session);
                }
            }
            
            closeRenameModal();
        }
        
        async function deleteSession() {
            console.log(`[deleteSession] 右键菜单删除: ${contextMenuSessionId}`);
            if (!contextMenuSessionId) return;
            
            try {
                if (!confirm('确定要删除这个会话吗？聊天记录将无法恢复。')) {
                    closeContextMenu();
                    return;
                }
                
                // 从数据库删除
                const success = await deleteSessionFromDB(contextMenuSessionId);
                console.log(`[deleteSession] 后端删除结果: ${success}`);
                if (!success) {
                    alert('删除失败，请重试');
                    closeContextMenu();
                    return;
                }
                
                // 从列表移除
                sessions = sessions.filter(s => s.id !== contextMenuSessionId);
                
                // 如果删除的是当前会话，切换到第一个
                if (currentSessionId === contextMenuSessionId) {
                    currentSessionId = null;
                    if (sessions.length > 0) {
                        await selectSession(sessions[0].id);
                        // selectSession 已经调用了 renderSessionList
                        closeContextMenu();
                        return;
                    } else {
                        // 没有会话了，显示空状态
                        document.getElementById('messages').innerHTML = `
                            <div class="empty-state">
                                <div class="empty-icon">🤖</div>
                                <div>点击右上角"..."创建新会话</div>
                            </div>
                        `;
                        document.getElementById('headerTitle').textContent = '选择一个会话';
                        selectedBots.clear();
                        updatePlaceholder();
                    }
                }
                
                renderSessionList();
                
                // 强制刷新 DOM
                requestAnimationFrame(() => {
                    const container = document.getElementById('botList');
                    if (container) {
                        const originalDisplay = container.style.display;
                        container.style.display = 'none';
                        void container.offsetHeight;
                        container.style.display = originalDisplay || '';
                    }
                });
                
                closeContextMenu();
            } catch (e) {
                console.error('[deleteSession] 删除过程中发生错误:', e);
                alert('删除失败: ' + e.message);
                closeContextMenu();
            }
        }
        
        function sendMessage() {
            console.log('sendMessage called');
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            console.log('text:', text, 'selectedBots:', selectedBots.size, 'isConnected:', isConnected);
            
            if (selectedBots.size === 0) { console.log('No bot selected'); return; }
            if (!isConnected) { console.log('Not connected'); return; }
            
            // 如果有待发送的文件，将消息和文件一起发送
            if (pendingFile) {
                const botPath = pendingFile.bot_path || pendingFile.file_name;
                const fileTypeText = pendingFile.isImage ? '图片' : '文件';
                
                // 构建包含文件和消息的内容
                let messageContent;
                if (pendingFile.isImage) {
                    messageContent = text 
                        ? `[用户发送了图片: ${pendingFile.file_name}](${pendingFile.file_url})\n\n${text}\n\n请查看这个图片并回复: ${botPath}`
                        : `[用户发送了图片: ${pendingFile.file_name}](${pendingFile.file_url})\n\n请查看这个图片并分析: ${botPath}`;
                } else {
                    messageContent = text
                        ? `[用户发送了文件: ${pendingFile.file_name}](${pendingFile.file_url})\n\n${text}\n\n请读取这个文件并回复: ${botPath}`
                        : `[用户发送了文件: ${pendingFile.file_name}](${pendingFile.file_url})\n\n请读取这个文件并分析: ${botPath}`;
                }
                
                // 如果有文字消息，显示在聊天中
                if (text) {
                    createUserMsg(text);
                }
                
                ws.send(JSON.stringify({
                    mode: selectedBots.size > 1 ? 'group' : 'single',
                    bots: Array.from(selectedBots),
                    message: messageContent,
                    chat_id: currentSessionId
                }));
                
                // 清空待发送文件
                pendingFile = null;
                input.placeholder = '发送消息...';
                input.value = '';
                input.style.height = 'auto';
            } else {
                // 普通消息发送
                if (!text) { console.log('No text'); return; }
                
                // 群聊模式下，检查@了哪些Bot
                let targetBots = Array.from(selectedBots);
                let shouldReply = true;
                
                if (selectedBots.size > 1) {
                    const mentionedBots = parseMentionedBots(text);
                    if (mentionedBots.length > 0) {
                        // 只发送给被@的Bot
                        targetBots = mentionedBots;
                    } else {
                        // 群聊中没有@任何人，只记录不回复
                        shouldReply = false;
                    }
                }
                
                // 创建并显示用户消息（内部已保存到数据库）
                createUserMsg(text);
                
                // 只有被@了才发送给Bot回复
                if (shouldReply) {
                    ws.send(JSON.stringify({
                        mode: selectedBots.size > 1 ? 'group' : 'single',
                        bots: targetBots,
                        message: text,
                        chat_id: currentSessionId
                    }));
                }
                
                input.value = '';
                input.style.height = 'auto';
            }
        }
        
        // 解析消息中的@提及，返回被@的Bot ID列表
        function parseMentionedBots(text) {
            const mentionedBotIds = [];
            const seen = new Set(); // 用于去重
            
            // 获取当前会话中的所有Bot
            const session = sessions.find(s => s.id === currentSessionId);
            if (!session) return mentionedBotIds;
            
            session.botIds.forEach(botId => {
                const bot = bots.find(b => b.id === botId);
                if (!bot) return;
                
                const botName = bot.name || bot.id;
                // 检查是否@了该Bot (@botName 或 @botId)
                // 使用更精确的正则：@后面跟着完整的botName或botId
                const escapedBotName = botName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const escapedBotId = botId.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const mentionPattern1 = new RegExp(`@${escapedBotName}(?:\\s|$)`, 'i');
                const mentionPattern2 = new RegExp(`@${escapedBotId}(?:\\s|$)`, 'i');
                
                if ((mentionPattern1.test(text) || mentionPattern2.test(text)) && !seen.has(botId)) {
                    mentionedBotIds.push(botId);
                    seen.add(botId);
                }
            });
            
            return mentionedBotIds;
        }
        
        function clearChat() {
            // 发送 /clear 命令给 Bot，让 Bot 处理清空逻辑
            if (!currentSessionId || selectedBots.size === 0) {
                alert('请先选择一个会话');
                return;
            }
            if (!isConnected) {
                alert('网络未连接');
                return;
            }
            
            // 显示用户发送的 /clear 命令
            createUserMsg('/clear');
            
            // 发送给 Bot
            ws.send(JSON.stringify({
                mode: 'group',
                bots: Array.from(selectedBots),
                message: '/clear',
                chat_id: currentSessionId
            }));
            
            // 清空输入框
            const input = document.getElementById('messageInput');
            input.value = '';
            input.style.height = 'auto';
        }
        
        // ========== @ 提及功能 ==========
        let activeMentionBotId = null;
        
        function showMentionDropdown() {
            // 获取当前会话中的Bot
            const session = sessions.find(s => s.id === currentSessionId);
            if (!session || session.botIds.length === 0) {
                alert('当前会话没有可用的 Bot');
                return;
            }
            
            const dropdown = document.getElementById('mentionDropdown');
            const input = document.getElementById('messageInput');
            
            // 只显示当前会话中的Bot
            const sessionBots = bots.filter(b => session.botIds.includes(b.id));
            if (sessionBots.length === 0) {
                alert('暂无可用的 Bot');
                return;
            }
            
            // 构建下拉菜单内容
            dropdown.innerHTML = sessionBots.map((bot, i) => {
                const cfg = botConfigs[i % botConfigs.length];
                return `
                    <div class="mention-item" onclick="insertMention('${bot.id}', '${bot.name || bot.id}')">
                        <div class="mention-avatar ${cfg.color} text-white">
                            <i class="fas ${cfg.icon}"></i>
                        </div>
                        <div>
                            <div class="mention-name">${bot.name || bot.id}</div>
                            <div class="mention-id">@${bot.id}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            dropdown.classList.add('show');
            
            // 点击外部关闭
            setTimeout(() => {
                document.addEventListener('click', closeMentionDropdown, { once: true });
            }, 0);
        }
        
        function closeMentionDropdown() {
            document.getElementById('mentionDropdown').classList.remove('show');
        }
        
        function insertMention(botId, botName) {
            const input = document.getElementById('messageInput');
            const mention = `@${botName} `;
            
            // 在光标位置插入
            let start = input.selectionStart;
            const end = input.selectionEnd;
            const text = input.value;
            
            // 检查@前面是否已经有@，避免重复
            // 向前查找最近的@位置
            const beforeCursor = text.substring(0, start);
            const lastAtIndex = beforeCursor.lastIndexOf('@');
            
            if (lastAtIndex !== -1 && lastAtIndex === start - 1) {
                // 光标紧跟在@后面，替换这个@（用户输入的@）
                start = lastAtIndex;
            }
            
            input.value = text.substring(0, start) + mention + text.substring(end);
            input.focus();
            input.setSelectionRange(start + mention.length, start + mention.length);
            
            // 记录当前@的Bot
            activeMentionBotId = botId;
            
            closeMentionDropdown();
        }
        
        // 解析消息中的@提及
        function parseMentions(text) {
            // 找到所有 @BotName 并转换为特定格式
            let parsed = text;
            bots.forEach(bot => {
                const name = bot.name || bot.id;
                const regex = new RegExp(`@${name}\\b`, 'g');
                parsed = parsed.replace(regex, `<span class="mention-highlight">@${name}</span>`);
            });
            return parsed;
        }
        
        // ========== 停止生成功能 ==========
        
        function stopGeneration() {
            // 向所有正在回复的Bot发送停止信号
            activeStreams.forEach(msgId => {
                if (ws && isConnected) {
                    ws.send(JSON.stringify({
                        type: 'stop',
                        msg_id: msgId
                    }));
                }
            });
            
            // 本地停止当前显示的流
            streamingMessages.forEach((stream, msgId) => {
                stream.isStreaming = false;
                const contentDiv = document.getElementById(`content-${msgId}`);
                if (contentDiv && !contentDiv.innerHTML.includes('[已停止]')) {
                    contentDiv.innerHTML += '<div style="color:#8f959e;font-size:12px;margin-top:8px;">[已停止生成]</div>';
                }
            });
            
            // 清空待处理消息
            pendingMessages.clear();
            
            activeStreams.clear();
            streamingMessages.clear();
            hideStopBtn();
        }
        
        function showStopBtn() {
            document.getElementById('stopBtn').style.display = 'flex';
        }
        
        function hideStopBtn() {
            document.getElementById('stopBtn').style.display = 'none';
        }
        
        function scrollBottom() {
            const c = document.getElementById('messages');
            c.scrollTop = c.scrollHeight;
        }
        
        init();
    </script>
